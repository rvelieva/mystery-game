<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>По следите на старостта</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:10px;
    background:#f4f4f4;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.text-box{
    background:#f8f8f8;
    padding:20px;
    border-radius:10px;
    line-height:1.7;
    margin-bottom:30px;
}

.text-box img{
    max-width:100%;
    height:auto;
    border-radius:10px;
}

.coord{
    font-size:22px;
    margin:20px 0;
    word-wrap:break-word;
}

.coord input{
    width:42px;
    height:42px;
    text-align:center;
    font-size:22px;
    margin:2px;
    border:2px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.correct{
    background:#4CAF50;
    color:white;
    border-color:#2E7D32;
}

.wrong{
    background:#F44336;
    color:white;
    border-color:#B71C1C;
}

button{
    padding:12px 24px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

@media (max-width:600px){

    .container{
        padding:15px;
    }

    h1{
        font-size:24px;
    }

    .coord{
        font-size:18px;
    }

    .coord input{
        width:34px;
        height:34px;
        font-size:18px;
        margin:1px;
    }

    button{
        width:100%;
        font-size:16px;
    }

    #result{
        font-size:18px;
    }
}
</style>
</head>
<body>

<div class="container">

<h1>По следите на старостта</h1>

<div class="text-box">
    <img src="./img/Screenshot 2026-06-05 001156.png" alt="Загадка">
</div>

<div class="coord">

    <input maxlength="1" data-index="0">
    <input maxlength="1" data-index="1">

    .

    <input maxlength="1" data-index="2">
    <input maxlength="1" data-index="3">
    <input maxlength="1" data-index="4">
    <input maxlength="1" data-index="5">
    <input maxlength="1" data-index="6">

    ,

    <input maxlength="1" data-index="7">
    <input maxlength="1" data-index="8">

    .

    <input maxlength="1" data-index="9">
    <input maxlength="1" data-index="10">
    <input maxlength="1" data-index="11">
    <input maxlength="1" data-index="12">
    <input maxlength="1" data-index="13">

</div>

<button onclick="checkAnswer()">Провери</button>

<div id="result"></div>

</div>

<script>

// Верен отговор:
// 41.68520, 24.29032

const answer = [
'4','1',
'6','8','5','2','0',
'2','4',
'2','9','0','3','2'
];

function checkAnswer(){

    let allCorrect = true;

    document.querySelectorAll("input").forEach(input => {

        let index = input.dataset.index;

        if(input.value === answer[index]){
            input.classList.remove("wrong");
            input.classList.add("correct");
        }else{
            input.classList.remove("correct");
            input.classList.add("wrong");
            allCorrect = false;
        }

    });

    if(allCorrect){
        document.getElementById("result").innerHTML =
        "✅ Всички цифри са правилни! Отиди на посоченото място и като стигнеш помисли на колко години ставаш!";
    }else{
        document.getElementById("result").innerHTML =
        "❌ Има грешни цифри.";
    }
}
</script>

</body>
</html>
